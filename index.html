<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Intelligence Portfolio - Tactical RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-white min-h-screen">
    
    <!-- Seletor de Idioma Global (Persistente) -->
    <div class="fixed top-6 right-6 z-50 flex gap-3">
        <button id="lang-pt" class="lang-btn px-5 py-2 rounded-lg font-bold transition-all">
            PT
        </button>
        <button id="lang-en" class="lang-btn px-5 py-2 rounded-lg font-bold transition-all">
            EN
        </button>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TELA 1: SELEÇÃO DE PAÍS (GEOPOLÍTICA) -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="screen-geopolitics" class="screen min-h-screen flex flex-col items-center justify-center p-8">
        <div class="text-center mb-16 fade-in">
            <h1 class="text-6xl font-bold mb-6 tracking-wider" data-lang="title-geopolitics"></h1>
            <p class="text-2xl opacity-80" data-lang="subtitle-geopolitics"></p>
        </div>
        
        <div id="countries-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-6 max-w-7xl fade-in">
            <!-- Países serão injetados dinamicamente -->
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TELA 2: ESCOLHA DE CATEGORIA (VETOR DE ABORDAGEM) -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="screen-category" class="screen hidden min-h-screen flex flex-col items-center justify-center p-8">
        <!-- Botão Voltar -->
        <button id="btn-back-countries" class="btn-back">
            <span class="text-2xl">←</span>
            <span data-lang="btn-back"></span>
        </button>

        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold mb-6 tracking-wider" data-lang="title-category"></h1>
            <p class="text-xl opacity-80" data-lang="subtitle-category"></p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl w-full">
            <!-- Card: Grupos -->
            <div class="category-card">
                <div class="text-7xl mb-6 text-center">💀</div>
                <h2 class="text-4xl font-bold mb-4 text-center" data-lang="category-groups"></h2>
                <p class="text-center mb-8 opacity-70" data-lang="desc-groups"></p>
                
                <div class="space-y-3">
                    <button class="subcategory-btn" 
                            data-category="grupos" data-subcategory="lucro" data-lang="subcat-profit"></button>
                    <button class="subcategory-btn" 
                            data-category="grupos" data-subcategory="osint_sigint" data-lang="subcat-osint-sigint"></button>
                    <button class="subcategory-btn" 
                            data-category="grupos" data-subcategory="governo" data-lang="subcat-government"></button>
                </div>
            </div>

            <!-- Card: Indivíduos -->
            <div class="category-card">
                <div class="text-7xl mb-6 text-center">👤</div>
                <h2 class="text-4xl font-bold mb-4 text-center" data-lang="category-individuals"></h2>
                <p class="text-center mb-8 opacity-70" data-lang="desc-individuals"></p>
                
                <div class="space-y-3">
                    <button class="subcategory-btn" 
                            data-category="individuos" data-subcategory="lendas" data-lang="subcat-legends"></button>
                    <button class="subcategory-btn" 
                            data-category="individuos" data-subcategory="especialistas" data-lang="subcat-specialists"></button>
                    <button class="subcategory-btn" 
                            data-category="individuos" data-subcategory="lucro" data-lang="subcat-profit"></button>
                </div>
            </div>

            <!-- Card: Organizações Governamentais -->
            <div class="category-card">
                <div class="text-7xl mb-6 text-center">🏛️</div>
                <h2 class="text-4xl font-bold mb-4 text-center" data-lang="category-gov"></h2>
                <p class="text-center mb-8 opacity-70" data-lang="desc-gov"></p>
                
                <div class="space-y-3">
                    <button class="subcategory-btn" 
                            data-category="organizacoes" data-subcategory="militares" data-lang="subcat-military"></button>
                    <button class="subcategory-btn" 
                            data-category="organizacoes" data-subcategory="inteligencia" data-lang="subcat-intelligence"></button>
                    <button class="subcategory-btn" 
                            data-category="organizacoes" data-subcategory="policia_especializada" data-lang="subcat-police"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TELA 3: GRID TÁTICO DE CARDS RPG -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="screen-cards" class="screen hidden min-h-screen flex flex-col p-8">
        <!-- Header Tático -->
        <div class="flex justify-between items-center mb-10">
            <button id="btn-back-category" class="btn-back">
                <span class="text-2xl">←</span>
                <span data-lang="btn-back"></span>
            </button>
            
            <h1 class="text-5xl font-bold tracking-wider" data-lang="title-cards"></h1>
            
            <div class="w-40"></div>
        </div>
        
        <!-- Grid de Cards -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 justify-items-center flex-1">
            <!-- Cards serão injetados dinamicamente -->
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- MODAL: DOSSIÊ DE INTELIGÊNCIA HOLOGRÁFICO (ZOOM) -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div id="threat-modal" class="modal-overlay">
        <div class="modal-content-wrapper">
            <!-- Botão Fechar -->
            <button id="modal-close" class="modal-close-btn">×</button>
            
            <!-- Conteúdo do Modal -->
            <div id="modal-body" class="modal-body">
                <!-- Conteúdo dinâmico será injetado aqui -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
