<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Intelligence Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    
    <!-- Seletor de Idioma Global -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button id="lang-pt" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition-all">
            PT
        </button>
        <button id="lang-en" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-all">
            EN
        </button>
    </div>

    <!-- TELA 1: Escolha de Categoria -->
    <div id="screen-category" class="screen min-h-screen flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-bold mb-4 text-center" data-lang="title-category"></h1>
        <p class="text-xl mb-12 text-gray-400 text-center" data-lang="subtitle-category"></p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
            <!-- Card: Grupos -->
            <div class="category-card bg-gradient-to-br from-red-900 to-red-700 p-8 rounded-xl shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">💀</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-groups"></h2>
                <p class="text-center text-gray-200 mb-6" data-lang="desc-groups"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-red-800 hover:bg-red-600 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="ransomware" data-lang="subcat-ransomware"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-red-800 hover:bg-red-600 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="hacktivismo" data-lang="subcat-hacktivism"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-red-800 hover:bg-red-600 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="espionagem" data-lang="subcat-espionage"></button>
                </div>
            </div>

            <!-- Card: Indivíduos -->
            <div class="category-card bg-gradient-to-br from-purple-900 to-purple-700 p-8 rounded-xl shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">👤</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-individuals"></h2>
                <p class="text-center text-gray-200 mb-6" data-lang="desc-individuals"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-purple-800 hover:bg-purple-600 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="lucro" data-lang="subcat-profit"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-purple-800 hover:bg-purple-600 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="fama" data-lang="subcat-fame"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-purple-800 hover:bg-purple-600 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="adolescentes" data-lang="subcat-teens"></button>
                </div>
            </div>

            <!-- Card: Organizações Governamentais -->
            <div class="category-card bg-gradient-to-br from-green-900 to-green-700 p-8 rounded-xl shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">🏛️</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-gov"></h2>
                <p class="text-center text-gray-200 mb-6" data-lang="desc-gov"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-green-800 hover:bg-green-600 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="inteligencia" data-lang="subcat-intelligence"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-green-800 hover:bg-green-600 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="militar" data-lang="subcat-military"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-green-800 hover:bg-green-600 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="policia" data-lang="subcat-police"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- TELA 2: Seleção Geopolítica -->
    <div id="screen-geopolitics" class="screen hidden min-h-screen flex flex-col items-center justify-center p-8">
        <button id="btn-back-category" class="absolute top-20 left-8 px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-all flex items-center gap-2">
            <span>←</span>
            <span data-lang="btn-back"></span>
        </button>

        <h1 class="text-5xl font-bold mb-4 text-center" data-lang="title-geopolitics"></h1>
        <p class="text-xl mb-12 text-gray-400 text-center" data-lang="subtitle-geopolitics"></p>
        
        <div id="countries-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-7xl">
            <!-- Países serão injetados dinamicamente -->
        </div>
    </div>

    <!-- TELA 3: Grid de Cards RPG -->
    <div id="screen-cards" class="screen hidden min-h-screen flex flex-col p-8">
        <div class="flex justify-between items-center mb-8">
            <button id="btn-back-geopolitics" class="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-all flex items-center gap-2">
                <span>←</span>
                <span data-lang="btn-back"></span>
            </button>
            
            <h1 class="text-4xl font-bold" data-lang="title-cards"></h1>
            
            <div class="w-32"></div>
        </div>
        
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 flex-1">
            <!-- Cards serão injetados dinamicamente -->
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
