<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Intelligence Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-white min-h-screen">
    
    <!-- Seletor de Idioma Global -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button id="lang-pt" class="px-4 py-2 rounded-lg font-bold transition-all">
            PT
        </button>
        <button id="lang-en" class="px-4 py-2 rounded-lg font-bold transition-all">
            EN
        </button>
    </div>

    <!-- TELA 1: Seleção de País (NOVA PRIMEIRA TELA) -->
    <div id="screen-geopolitics" class="screen min-h-screen flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-bold mb-4 text-center" data-lang="title-geopolitics"></h1>
        <p class="text-xl mb-12 text-center" data-lang="subtitle-geopolitics"></p>
        
        <div id="countries-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-7xl">
            <!-- Países serão injetados dinamicamente -->
        </div>
    </div>

    <!-- TELA 2: Escolha de Categoria (AGORA É SEGUNDA TELA) -->
    <div id="screen-category" class="screen hidden min-h-screen flex flex-col items-center justify-center p-8">
        <button id="btn-back-countries" class="absolute top-20 left-8 px-6 py-3 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-bold transition-all flex items-center gap-2">
            <span>←</span>
            <span data-lang="btn-back"></span>
        </button>

        <h1 class="text-5xl font-bold mb-4 text-center" data-lang="title-category"></h1>
        <p class="text-xl mb-12 text-center" data-lang="subtitle-category"></p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
            <!-- Card: Grupos -->
            <div class="category-card p-8 rounded-lg shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">💀</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-groups"></h2>
                <p class="text-center mb-6" data-lang="desc-groups"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="lucro" data-lang="subcat-profit"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="fama" data-lang="subcat-fame"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="governo" data-lang="subcat-government"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="grupos" data-subcategory="osint_sigint" data-lang="subcat-osint-sigint"></button>
                </div>
            </div>

            <!-- Card: Indivíduos -->
            <div class="category-card p-8 rounded-lg shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">👤</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-individuals"></h2>
                <p class="text-center mb-6" data-lang="desc-individuals"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="lendas" data-lang="subcat-legends"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="especialistas" data-lang="subcat-specialists"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="individuos" data-subcategory="lucro" data-lang="subcat-profit"></button>
                </div>
            </div>

            <!-- Card: Organizações Governamentais -->
            <div class="category-card p-8 rounded-lg shadow-2xl hover:scale-105 transition-transform cursor-pointer">
                <div class="text-6xl mb-4 text-center">🏛️</div>
                <h2 class="text-3xl font-bold mb-4 text-center" data-lang="category-gov"></h2>
                <p class="text-center mb-6" data-lang="desc-gov"></p>
                
                <div class="space-y-2">
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="militares" data-lang="subcat-military"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="inteligencia" data-lang="subcat-intelligence"></button>
                    <button class="subcategory-btn w-full py-3 px-4 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-semibold transition-all" 
                            data-category="organizacoes" data-subcategory="policia_especializada" data-lang="subcat-police"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- TELA 3: Grid de Cards RPG -->
    <div id="screen-cards" class="screen hidden min-h-screen flex flex-col p-8">
        <div class="flex justify-between items-center mb-8">
            <button id="btn-back-category" class="px-6 py-3 bg-black border border-zinc-800 hover:border-cyan-400 hover:text-cyan-400 rounded-lg font-bold transition-all flex items-center gap-2">
                <span>←</span>
                <span data-lang="btn-back"></span>
            </button>
            
            <h1 class="text-4xl font-bold" data-lang="title-cards"></h1>
            
            <div class="w-32"></div>
        </div>
        
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 flex-1">
            <!-- Cards serão injetados dinamicamente -->
        </div>
    </div>

    <!-- MODAL: Dossiê de Inteligência -->
    <div id="threat-modal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-50 p-8">
        <div class="modal-content bg-zinc-950 border-2 rounded-lg max-w-4xl w-full max-h-[90vh] overflow-y-auto relative">
            <!-- Botão Fechar -->
            <button id="modal-close" class="absolute top-4 right-4 text-4xl hover:text-cyan-400 transition-all">
                ×
            </button>
            
            <!-- Conteúdo do Modal será injetado dinamicamente -->
            <div id="modal-body" class="p-8">
                <!-- Conteúdo dinâmico aqui -->
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
